<html>
    <head>
        <meta charset="UTF-8"></meta>
        <title>Лабораторная работа 1.14 - Пример 3</title>
        <script src="../jquery-3.5.1.js"></script>
        <script>
            function hideText(n){
                if (n < 5){
                    $("#txt" + n).slideUp(1000, function(){hideText(n+1);});
                } else {
                    $("#txt" + n).slideUp(1000, function(){alert("Все параграфы скрыты")});
                }
            }

            $(document).ready(function(){
                $("#btn1").click(function(){
                    hideText(1);
                });
            });
        </script>
    </head>
    
    <body>
        <input type="button" id="btn1" value="Скрыть текст"/>
        
        <br>

        <div id="txt1">NES</div>
        <div id="txt2">Game Boy</div>
        <div id="txt3">SNES</div>
        <div id="txt4">Game Boy Color</div>
        <div id="txt5">N64</div>
    </body>
</html>
