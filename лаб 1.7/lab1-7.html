<html>
    	<head>
        <meta charset="UTF-8"></meta>
        <title>Лабораторная работа 1.7</title>
		<script>
            var x = 50, y = 50;
            var canvas;
            var ctx;
            var size = 20;
            
            function init(){
                canvas = document.getElementById('canvas');
                ctx = canvas.getContext('2d');
                ctx.strokeStyle = 'black';
                ctx.strokeRect(0,0,640,480);
                ctx.fillStyle = 'black';
                ctx.fillRect(x,y,size,size);

                document.addEventListener('keydown', move);
                document.getElementById('x').value = x;
                document.getElementById('y').value = y;

                document.addEventListener("keydown", showCode);
                document.getElementById("keyCodeTest").value = "Press any key";
            }
            
            function showCode(event){
                document.getElementById("keyCodeTest").value = event.keyCode;
            }

            function move(event){
                ctx.clearRect(x,y,size,size);

                if (event.keyCode == 38) {y -= 5;}
                if (event.keyCode == 40) {y += 5;}
                if (event.keyCode == 39) {x += 5;}
                if (event.keyCode == 37) {x -= 5;}

                if (event.keyCode == 49) {ctx.fillStyle = 'red';}
                if (event.keyCode == 50) {ctx.fillStyle = 'green';}
                if (event.keyCode == 51) {ctx.fillStyle = 'blue';}

                if (event.keyCode == 83) {size = 10;}
                if (event.keyCode == 77) {size = 20;}
                if (event.keyCode == 66) {size = 30;}

                document.getElementById('x').value = x;
                document.getElementById('y').value = y;

                ctx.fillRect(x,y,size,size);
            }
        </script>
    </head>

    <body onload="init();">
        <input type="text" id="keyCodeTest"></input>
        <input type="text" id="x"></input>
        <input type="text" id="y"></input>

        <br>

        <canvas id="canvas" width="640" height="480"></canvas>
    </body>
</html>
