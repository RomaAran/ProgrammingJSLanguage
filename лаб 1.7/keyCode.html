<html>
    	<head>
        <meta charset="UTF-8"></meta>
        <title>Лабораторная работа 1.6</title>
		<script>
            function init(){
                document.addEventListener("keydown", showCode);
                document.getElementById("keyCode").value = "Press any key";
            }

            function showCode(){
                document.getElementById("keyCode").value = event.keyCode;
            }
        </script>
    </head>

    <body onload="init()">
        <input type="text" id="keyCode"></input>
    </body>
</html>
